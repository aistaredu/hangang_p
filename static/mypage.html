<!DOCTYPE html>
<!--
=================================================================
static/mypage.html — 내 예약 화면 (4회차 완성)
=================================================================
📌 사용하는 Bootstrap 5 컴포넌트:
  ① Navbar          : 상단 네비게이션 (로그인 상태 반영)
  ② Nav + Tab       : 예약 상태별 탭 (전체/예약중/완료/취소)
  ③ List Group      : 예약 항목 목록 스타일
  ④ Badge           : 예약 상태 표시 (초록/노랑/빨강)
  ⑤ Offcanvas       : 예약 상세 정보 슬라이드 패널 (오른쪽에서 등장)
  ⑥ Modal           : 취소 확인 팝업 (실수 방지)
  ⑦ Button          : 상세보기, 취소, 닫기 버튼
  ⑧ Spinner         : 로딩 중 표시
  ⑨ Alert           : 빈 목록 / 오류 메시지
  ⑩ Toast           : 취소 성공 알림

📌 4회차에서 추가되는 기능:
  - 로그인 안 하면 Modal 로그인 팝업 자동 표시
  - 탭 클릭으로 예약 상태별 필터
  - 카드 클릭 → Offcanvas에서 상세 정보
  - Offcanvas 안 취소 버튼 → 확인 Modal → API 호출
=================================================================
-->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 예약 — 한강공원 주차장 예측</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }

        /* 예약 항목 — 클릭 가능한 느낌 */
        .reservation-item {
            cursor: pointer;
            transition: background-color 0.1s;
        }
        .reservation-item:hover {
            background-color: #f0f4ff !important;
        }

        /* Toast 고정 위치 */
        .toast-container {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 1100;
        }
    </style>
</head>
<body>

<!-- navbar: layout.js가 채워 넣음 (공통) -->
<div id="navbar-placeholder"></div>


<!-- 로그인 모달은 layout.js가 공통으로 삽입 -->


<!-- =============================================================
     ⑥ Bootstrap 컴포넌트: Modal (예약 취소 확인)
     =============================================================
     예약 취소는 되돌릴 수 없는 작업이므로
     실수 방지를 위해 Confirm Modal을 사용합니다.

     modal-dialog-centered : 화면 수직 중앙에 Modal 표시
     ============================================================= -->
<div class="modal fade" id="cancelModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">⚠️ 예약 취소</h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="mb-1">정말로 예약을 취소하시겠습니까?</p>
                <!-- 취소할 예약 정보 표시 (JS로 동적 변경) -->
                <p class="text-muted small" id="cancelModalInfo"></p>
                <p class="text-danger small mb-0">⚠️ 취소 후에는 되돌릴 수 없습니다.</p>
            </div>
            <div class="modal-footer border-0">
                <!-- data-bs-dismiss="modal": 클릭 시 Modal 닫기 -->
                <button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    돌아가기
                </button>
                <!-- 확인 버튼: JS에서 이벤트 등록 -->
                <button type="button" class="btn btn-danger fw-bold"
                        id="confirmCancelBtn">
                    취소 확인
                </button>
            </div>
        </div>
    </div>
</div>


<!-- =============================================================
     ⑤ Bootstrap 컴포넌트: Offcanvas (예약 상세 슬라이드 패널)
     =============================================================
     Offcanvas: 화면 가장자리에서 슬라이드로 등장하는 패널
     오른쪽("end")에서 나타납니다.

     Offcanvas 구조:
       .offcanvas           : 최상위 래퍼
       .offcanvas-header    : 제목 + 닫기 버튼
       .offcanvas-body      : 상세 내용

     offcanvas-end : 오른쪽에서 슬라이드
     (offcanvas-start: 왼쪽, offcanvas-top: 위쪽, offcanvas-bottom: 아래쪽)
     ============================================================= -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="detailPanel">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title fw-bold">📋 예약 상세</h5>
        <!-- data-bs-dismiss="offcanvas": 클릭 시 Offcanvas 닫기 -->
        <button type="button" class="btn-close"
                data-bs-dismiss="offcanvas"></button>
    </div>

    <!-- Offcanvas 본문: 예약 상세 정보 (JS로 동적 채움) -->
    <div class="offcanvas-body">

        <!-- 주차장 정보 섹션 -->
        <div class="mb-4">
            <p class="text-muted small mb-1 fw-bold">📍 주차장</p>
            <h5 class="fw-bold" id="detailLotName">—</h5>
        </div>

        <!-- 예약 정보 섹션 -->
        <div class="row mb-4 g-3">
            <div class="col-6">
                <p class="text-muted small mb-1">예약 날짜</p>
                <p class="fw-bold mb-0" id="detailDate">—</p>
            </div>
            <div class="col-6">
                <p class="text-muted small mb-1">상태</p>
                <!-- Badge는 JS로 동적으로 채움 -->
                <span class="badge" id="detailStatusBadge">—</span>
            </div>
            <div class="col-6">
                <p class="text-muted small mb-1">예약 번호</p>
                <p class="fw-bold mb-0" id="detailId">—</p>
            </div>
            <div class="col-6">
                <p class="text-muted small mb-1">예약 일시</p>
                <p class="fw-bold mb-0 small" id="detailCreatedAt">—</p>
            </div>
        </div>

        <hr>

        <!-- 취소 버튼 (active 상태일 때만 JS로 표시) -->
        <!-- w-100: width 100% (가득 차는 버튼) -->
        <button class="btn btn-danger w-100 fw-bold d-none"
                id="cancelBtn">
            🗑️ 예약 취소
        </button>

        <!-- 이미 취소된 경우 안내 메시지 -->
        <div class="alert alert-secondary d-none" id="alreadyCancelledMsg">
            이미 취소된 예약입니다.
        </div>

    </div><!-- /offcanvas-body -->
</div><!-- /offcanvas -->


<!-- =============================================================
     ⑩ Toast 알림
     ============================================================= -->
<div class="toast-container">
    <div id="liveToast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-bold" id="toastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>


<!-- =============================================================
     메인 콘텐츠
     ============================================================= -->
<div class="container mt-4">

    <!-- 페이지 제목 -->
    <div class="row mb-3">
        <div class="col">
            <h2 class="fw-bold">내 예약 내역</h2>
            <p class="text-muted mb-0">예약 항목을 클릭하면 상세 정보와 취소 버튼이 표시됩니다</p>
        </div>
    </div>

    <!-- ==========================================================
         ② Bootstrap 컴포넌트: Nav + Tab (상태별 필터 탭)
         ==========================================================
         nav-tabs  : 탭 스타일 네비게이션
         nav-fill  : 탭을 컨테이너 너비에 맞게 균등 분배

         data-bs-toggle="tab"       : 탭 전환 기능 활성화
         data-bs-target="#tabId"    : 전환할 패널 ID
         ========================================================== -->
    <ul class="nav nav-tabs nav-fill mb-3" id="reservationTabs">
        <li class="nav-item">
            <!-- active: 기본으로 선택된 탭 -->
            <button class="nav-link active fw-bold"
                    data-bs-toggle="tab"
                    data-bs-target="#allPane"
                    data-status="">
                전체
            </button>
            <!-- data-status="": 상태 필터 없음 (전체 조회) -->
        </li>
        <li class="nav-item">
            <button class="nav-link fw-bold"
                    data-bs-toggle="tab"
                    data-bs-target="#activePane"
                    data-status="active">
                🟢 예약중
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link fw-bold"
                    data-bs-toggle="tab"
                    data-bs-target="#completedPane"
                    data-status="completed">
                ✅ 완료
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link fw-bold"
                    data-bs-toggle="tab"
                    data-bs-target="#cancelledPane"
                    data-status="cancelled">
                ❌ 취소
            </button>
        </li>
    </ul>

    <!-- 탭 패널 컨테이너
         tab-content: 탭 전환 시 패널 보이기/숨기기를 Bootstrap이 자동 처리 -->
    <div class="tab-content">

        <!-- 전체 탭 패널
             tab-pane   : 탭 패널 기본 스타일
             fade       : 전환 시 페이드 애니메이션
             show active: 기본으로 보이는 패널 -->
        <div class="tab-pane fade show active" id="allPane">
            <!-- ⑧ Spinner: 로딩 중 표시 -->
            <div class="text-center py-4 d-none" id="allLoading">
                <div class="spinner-border text-primary spinner-border-sm"></div>
                <span class="ms-2 text-muted">불러오는 중...</span>
            </div>
            <!-- ③ List Group: 예약 목록 컨테이너 -->
            <div class="list-group" id="allList"></div>
        </div>

        <!-- 예약중 탭 패널 -->
        <div class="tab-pane fade" id="activePane">
            <div class="text-center py-4 d-none" id="activeLoading">
                <div class="spinner-border text-primary spinner-border-sm"></div>
                <span class="ms-2 text-muted">불러오는 중...</span>
            </div>
            <div class="list-group" id="activeList"></div>
        </div>

        <!-- 완료 탭 패널 -->
        <div class="tab-pane fade" id="completedPane">
            <div class="text-center py-4 d-none" id="completedLoading">
                <div class="spinner-border text-primary spinner-border-sm"></div>
                <span class="ms-2 text-muted">불러오는 중...</span>
            </div>
            <div class="list-group" id="completedList"></div>
        </div>

        <!-- 취소 탭 패널 -->
        <div class="tab-pane fade" id="cancelledPane">
            <div class="text-center py-4 d-none" id="cancelledLoading">
                <div class="spinner-border text-primary spinner-border-sm"></div>
                <span class="ms-2 text-muted">불러오는 중...</span>
            </div>
            <div class="list-group" id="cancelledList"></div>
        </div>

    </div><!-- /tab-content -->
</div><!-- /container -->


<!-- footer: layout.js가 채워 넣음 (공통) -->
<div id="footer-placeholder"></div>


<!-- Bootstrap 5 JS CDN (Modal, Offcanvas, Tab, Toast 동작에 필요) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
<!-- 공통 API 유틸리티 (api.js 먼저 로드) -->
<script src="/static/js/api.js"></script>
<!-- 공통 navbar/footer/모달/토스트 (api.js 이후 로드) -->
<script src="/static/js/layout.js"></script>

<script>
// =============================================================
// 전역 상태 — 현재 Offcanvas에 열린 예약 ID
// 취소 확인 Modal에서 어떤 예약을 취소할지 알기 위해 사용
// =============================================================
let selectedReservationId = null;


// =============================================================
// 상태별 표시 설정 (배지 색상 + 텍스트)
// =============================================================
const STATUS_CONFIG = {
    // 상태값   : { 뱃지 클래스,       표시 텍스트 }
    active   : { badgeClass: "bg-success", label: "예약중" },
    completed: { badgeClass: "bg-primary", label: "이용완료" },
    cancelled: { badgeClass: "bg-secondary", label: "취소됨" },
};


// =============================================================
// showToast() 와 Navbar 상태 전환은 공통 파일(layout.js)의 전역 함수를 사용한다.
//   (여기서 다시 선언하면 layout.js의 함수를 덮어쓰므로 선언하지 않음)
// =============================================================


// =============================================================
// 예약 항목 HTML 생성
// ③ List Group 컴포넌트 활용
// =============================================================
function createReservationItem(reservation) {
    const cfg = STATUS_CONFIG[reservation.status] || { badgeClass: "bg-secondary", label: reservation.status };

    // ③ list-group-item: Bootstrap List Group 항목 스타일
    //    list-group-item-action: 호버 효과 + 클릭 가능한 스타일
    //    d-flex justify-content-between align-items-center: 양 끝 정렬
    return `
        <div class="list-group-item list-group-item-action reservation-item py-3"
             onclick="openDetail(${JSON.stringify(reservation).replace(/"/g, '&quot;')})">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-1 fw-bold">${reservation.lot_name}</h6>
                    <small class="text-muted">
                        📅 ${reservation.reserved_date} &nbsp;|&nbsp;
                        #${reservation.id}
                    </small>
                </div>
                <!-- ④ Badge: 예약 상태 표시 -->
                <span class="badge ${cfg.badgeClass} ms-2">${cfg.label}</span>
            </div>
        </div>
    `;
}


// =============================================================
// 예약 목록 API 호출 & 렌더링
// reservation_status: "active" / "cancelled" / "" (전체)
// =============================================================
async function loadReservations(status, listId, loadingId) {
    const listEl    = document.getElementById(listId);
    const loadingEl = document.getElementById(loadingId);

    // 로딩 스피너 표시
    loadingEl.classList.remove("d-none");
    listEl.innerHTML = "";

    try {
        // GET /reservations/me  또는
        // GET /reservations/me?reservation_status=active
        const url  = status
            ? `/reservations/me?reservation_status=${status}`
            : `/reservations/me`;
        const data = await apiGet(url);
        // data: ReservationDetailResponse 배열
        // [{ id, lot_id, lot_name, reserved_date, status, created_at }, ...]

        if (data.length === 0) {
            // ⑨ Alert: 빈 목록 안내
            // alert-info: 파란색 정보성 알림
            listEl.innerHTML = `
                <div class="alert alert-light border text-center py-4">
                    <p class="mb-0 text-muted">예약 내역이 없습니다.</p>
                </div>
            `;
            return;
        }

        // 예약 항목 카드 렌더링
        listEl.innerHTML = data.map(r => createReservationItem(r)).join("");

    } catch (error) {
        // ⑨ Alert: 오류 메시지
        listEl.innerHTML = `
            <div class="alert alert-danger">
                ⚠️ 예약 정보를 불러올 수 없습니다: ${error.message}
            </div>
        `;
    } finally {
        // 성공·실패 상관없이 항상 스피너 숨김
        loadingEl.classList.add("d-none");
    }
}


// =============================================================
// Offcanvas 열기 — 예약 상세 정보 표시
// ⑤ Offcanvas 컴포넌트 JS 제어
// =============================================================
function openDetail(reservation) {
    // 현재 선택된 예약 ID 저장 (취소 시 사용)
    selectedReservationId = reservation.id;

    // ── Offcanvas 내용 채우기 ─────────────────────────────────
    document.getElementById("detailLotName").textContent  = reservation.lot_name;
    document.getElementById("detailDate").textContent     = reservation.reserved_date;
    document.getElementById("detailId").textContent       = `#${reservation.id}`;
    document.getElementById("detailCreatedAt").textContent =
        new Date(reservation.created_at).toLocaleString("ko-KR");
    // Date 객체의 toLocaleString("ko-KR"): 한국 날짜 형식으로 변환
    // 예) "2025. 6. 14. 오후 3:00:00"

    // ── 상태 뱃지 설정 ────────────────────────────────────────
    const cfg        = STATUS_CONFIG[reservation.status] || { badgeClass: "bg-secondary", label: reservation.status };
    const statusBadge = document.getElementById("detailStatusBadge");
    // ④ Badge 클래스 동적 변경
    statusBadge.className   = `badge fs-6 ${cfg.badgeClass}`;
    statusBadge.textContent = cfg.label;

    // ── 취소 버튼 표시 여부 ───────────────────────────────────
    const cancelBtn         = document.getElementById("cancelBtn");
    const alreadyCancelled  = document.getElementById("alreadyCancelledMsg");

    if (reservation.status === "active") {
        // 예약중 상태만 취소 가능
        cancelBtn.classList.remove("d-none");        // 취소 버튼 표시
        alreadyCancelled.classList.add("d-none");    // 안내 메시지 숨김
    } else {
        // 이미 취소됐거나 완료된 예약
        cancelBtn.classList.add("d-none");           // 취소 버튼 숨김
        alreadyCancelled.classList.remove("d-none"); // 안내 메시지 표시
    }

    // ── Offcanvas 열기 ────────────────────────────────────────
    // bootstrap.Offcanvas: Bootstrap JS Offcanvas 클래스
    // bootstrap.Offcanvas.getOrCreateInstance(): 인스턴스 가져오거나 새로 생성
    // .show(): 화면에 Offcanvas 슬라이드
    const offcanvasEl = document.getElementById("detailPanel");
    bootstrap.Offcanvas.getOrCreateInstance(offcanvasEl).show();
}


// =============================================================
// 취소 확인 Modal 열기
// ⑥ 취소 버튼 → 확인 Modal 표시 (실수 방지)
// =============================================================
function openCancelModal() {
    // Offcanvas에서 선택한 예약 정보 표시
    const lotName = document.getElementById("detailLotName").textContent;
    const date    = document.getElementById("detailDate").textContent;
    document.getElementById("cancelModalInfo").textContent =
        `${lotName} / ${date}`;

    // Modal 열기
    // bootstrap.Modal.getOrCreateInstance(): 인스턴스 가져오거나 생성
    const cancelModalEl = document.getElementById("cancelModal");
    bootstrap.Modal.getOrCreateInstance(cancelModalEl).show();
}


// =============================================================
// 실제 예약 취소 API 호출
// DELETE /reservations/{id}
// =============================================================
async function executeCancel() {
    if (!selectedReservationId) return;

    try {
        // api.js의 apiDelete() 함수 사용
        // DELETE /reservations/{id} — Authorization 헤더 자동 첨부
        await apiDelete(`/reservations/${selectedReservationId}`);
        // 성공: 204 No Content (본문 없음)

        // ── 취소 성공 후 처리 ─────────────────────────────────
        // 1) 확인 Modal 닫기
        bootstrap.Modal.getInstance(document.getElementById("cancelModal")).hide();

        // 2) Offcanvas 닫기
        bootstrap.Offcanvas.getInstance(document.getElementById("detailPanel")).hide();

        // 3) Toast 알림
        showToast("예약이 취소되었습니다.", "warning");

        // 4) 목록 새로고침 (취소된 예약이 목록에서 상태 변경 반영)
        // 현재 활성 탭 찾기
        const activeTab = document.querySelector("#reservationTabs .nav-link.active");
        const status    = activeTab ? activeTab.dataset.status : "";
        // 탭의 data-status 속성값으로 어떤 목록을 새로고침할지 결정
        loadTabData(status);

    } catch (error) {
        showToast(`취소 실패: ${error.message}`, "danger");
    }
}


// =============================================================
// 탭 데이터 로드 (탭 클릭 시 호출)
// status로 어느 탭의 데이터를 로드할지 결정
// =============================================================
function loadTabData(status) {
    // status값 → listId, loadingId 매핑
    const config = {
        ""         : { listId: "allList",       loadingId: "allLoading" },
        "active"   : { listId: "activeList",    loadingId: "activeLoading" },
        "completed": { listId: "completedList", loadingId: "completedLoading" },
        "cancelled": { listId: "cancelledList", loadingId: "cancelledLoading" },
    };
    const { listId, loadingId } = config[status] || config[""];
    loadReservations(status, listId, loadingId);
}


// =============================================================
// 로그인 후 mypage 전용 동작: 예약 목록 로드
//   layout.js의 공통 handleLogin이 로그인 성공 시 이 콜백을 호출한다.
// =============================================================
window.onAfterLogin = function () {
    loadTabData("");
};


// =============================================================
// 페이지 초기화
// =============================================================
document.addEventListener("DOMContentLoaded", () => {

    // navbar/로그인/로그아웃/토스트/모달은 layout.js가 공통 처리한다.
    // 여기서는 이 페이지 고유 로직만 담당한다.

    // ── 비로그인 → 로그인 Modal 자동 오픈 ────────────────────
    //   layout.js가 DOMContentLoaded에서 모달을 body에 삽입하므로,
    //   그 다음 순서로 실행되도록 약간 지연(setTimeout 0)해서 연다.
    if (!isLoggedIn()) {
        setTimeout(() => {
            const el = document.getElementById("authModal");
            if (el) bootstrap.Modal.getOrCreateInstance(el).show();
        }, 0);
    } else {
        loadTabData("");   // 로그인 상태 → 전체 예약 목록 로드
    }

    // ── 탭 클릭 이벤트 ────────────────────────────────────────
    document.getElementById("reservationTabs").addEventListener("show.bs.tab", (e) => {
        const status = e.target.dataset.status;
        loadTabData(status);
    });

    // ── 취소 버튼 (Offcanvas 안) ──────────────────────────────
    document.getElementById("cancelBtn").addEventListener("click", openCancelModal);

    // ── 취소 확인 버튼 (Confirm Modal 안) ────────────────────
    document.getElementById("confirmCancelBtn").addEventListener("click", executeCancel);
});
</script>
</body>
</html>
